name: RAG Evaluation Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  evaluate:
    name: Run Ragas Evaluation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore indexes from cache
        uses: actions/cache@v4
        id: index-cache
        with:
          path: |
            chroma_db/
            bm25_index.pkl
          key: rag-indexes-${{ hashFiles('data/docs/**') }}

      - name: Ingest documents (if no cache hit)
        if: steps.index-cache.outputs.cache-hit != 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python main.py ingest

      - name: Run evaluation gate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          RAGAS_FAITHFULNESS_THRESHOLD: "0.85"
          RAGAS_ANSWER_RELEVANCY_THRESHOLD: "0.80"
          RAGAS_CONTEXT_PRECISION_THRESHOLD: "0.75"
          RAGAS_CONTEXT_RECALL_THRESHOLD: "0.75"
        run: python ci/run_evals.py

      - name: Upload evaluation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ragas-scores
          path: ragas_results.json
          if-no-files-found: ignore
